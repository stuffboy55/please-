applications:
    v2ray-xhttp:
        type: 'nodejs:20'
        hooks:
            build: |
                npm install
        web:
            commands:
                start: 'node server.js'
            locations:
                '/':
                    allow: true
                    passthru: true

routes:
    "https://{default}/":
        type: upstream
        upstream: "v2ray-xhttp:http"
    "http://{default}/":
        type: redirect
        to: "https://{default}/"
